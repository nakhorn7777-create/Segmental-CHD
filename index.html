<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Segmental Analysis CHD Simulator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f7fa;
            color: #333;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            max-width: 1100px;
            margin: 0 auto;
        }
        .controls-panel {
            flex: 1;
            min-width: 320px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .visual-panel {
            flex: 1.2;
            min-width: 450px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1, h2, h3 {
            margin-top: 0;
            color: #2c3e50;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .checkbox-container {
            background-color: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            border-left: 4px solid #ffa726;
            margin-bottom: 15px;
        }
        .checkbox-group {
            margin-bottom: 10px;
        }
        .checkbox-group:last-child {
            margin-bottom: 0;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            background-color: #fff;
            font-size: 1rem;
        }
        canvas {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            background-color: #ffffff;
        }
        .notation-badge {
            margin-top: 15px;
            padding: 10px 20px;
            background-color: #e8f4fd;
            color: #1d88e5;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1.2rem;
        }
        .preset-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            min-width: 90px;
            flex: 1;
        }
        .btn-primary { background-color: #1d88e5; color: white; }
        .btn-secondary { background-color: #78909c; color: white; }
        .btn-warning { background-color: #ffa726; color: white; }
    </style>
</head>
<body>

    <div style="text-align: center; margin-bottom: 20px;">
        <h1>Segmental Analysis CHD Simulator</h1>
        <p>เครื่องมือจำลองแผนภาพบล็อกสรีรวิทยาหัวใจพิการแต่กำเนิดพร้อมระบบคำนวณสีเลือดผสม</p>
    </div>

    <div class="container">
        <div class="controls-panel">
            <h2>1. Segmental Inputs</h2>
            
            <div class="preset-buttons">
                <button class="btn btn-secondary" onclick="applyPreset('normal')">Normal</button>
                <button class="btn btn-primary" onclick="applyPreset('dtga')">d-TGA</button>
                <button class="btn btn-warning" onclick="applyPreset('dorv')">DORV + VSD</button>
            </div>

            <div class="form-group">
                <label for="situs">1. Atrial Situs (Situs)</label>
                <select id="situs" onchange="drawHeart()">
                    <option value="S">Situs Solitus (S) - RA Right, LA Left</option>
                    <option value="I">Situs Inversus (I) - RA Left, LA Right</option>
                </select>
            </div>

            <div class="form-group">
                <label for="loop">2. Ventricular Loop (Loop)</label>
                <select id="loop" onchange="drawHeart()">
                    <option value="D">D-Loop (RV Right, LV Left)</option>
                    <option value="L">L-Loop (RV Left, LV Right)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="av">3. AV Connection (ลิ้นหัวใจกั้นห้อง)</label>
                <select id="av" onchange="drawHeart()">
                    <option value="concordant">Concordant (ห้องบน-ล่างตรงกัน)</option>
                    <option value="discordant">Discordant (ห้องบน-ล่างสลับไขว้ฝั่ง)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="va">4. VA Connection (ทางออกเส้นเลือดใหญ่)</label>
                <select id="va" onchange="drawHeart()">
                    <option value="concordant">Concordant (LV->Ao, RV->PA) - ปกติ</option>
                    <option value="discordant">Discordant (RV->Ao, LV->PA) - TGA</option>
                    <option value="dorv">Double Outlet RV (Both Ao & PA -> RV)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="vessels">5. Great Arteries Relationship</label>
                <select id="vessels" onchange="drawHeart()">
                    <option value="normal">Normal (Ao อยู่เยื้องหลัง/ขวา)</option>
                    <option value="d-loop">D-Malposition (Ao อยู่หน้า/ขวา)</option>
                    <option value="l-loop">L-Malposition (Ao อยู่หน้า/ซ้าย)</option>
                </select>
            </div>

            <h3>2. Associated Defects (Shunts)</h3>
            <div class="checkbox-container">
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="asdCheck" onchange="drawHeart()">
                        <span>Atrial Septal Defect (ASD)</span>
                    </label>
                </div>
                <div class="checkbox-group" style="margin-top: 10px;">
                    <label class="checkbox-label">
                        <input type="checkbox" id="vsdCheck" onchange="drawHeart()">
                        <span>Ventricular Septal Defect (VSD)</span>
                    </label>
                </div>
            </div>
        </div>

        <div class="visual-panel">
            <h2>3. Anatomical Block Diagram</h2>
            <canvas id="heartCanvas" width="440" height="480"></canvas>
            <div class="notation-badge" id="notationDisplay">{S, D, S}</div>
            <div style="margin-top: 10px; font-size: 0.85rem; color: #666; text-align: center;">
                <span style="color: #ff3333; font-weight: bold;">■ Systemic (Ao)</span> | 
                <span style="color: #3366ff; font-weight: bold;">■ Pulmonary (PA)</span> |
                <span style="color: #9c27b0; font-weight: bold;">■ Mixed Blood (เลือดผสม)</span>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        function applyPreset(type) {
            if(type === 'normal') {
                document.getElementById('situs').value = 'S';
                document.getElementById('loop').value = 'D';
                document.getElementById('av').value = 'concordant';
                document.getElementById('va').value = 'concordant';
                document.getElementById('vessels').value = 'normal';
                document.getElementById('asdCheck').checked = false;
                document.getElementById('vsdCheck').checked = false;
            } else if(type === 'dtga') {
                document.getElementById('situs').value = 'S';
                document.getElementById('loop').value = 'D';
                document.getElementById('av').value = 'concordant';
                document.getElementById('va').value = 'discordant';
                document.getElementById('vessels').value = 'd-loop';
                document.getElementById('asdCheck').checked = false;
                document.getElementById('vsdCheck').checked = false;
            } else if(type === 'dorv') {
                document.getElementById('situs').value = 'S';
                document.getElementById('loop').value = 'D';
                document.getElementById('av').value = 'concordant';
                document.getElementById('va').value = 'dorv';
                document.getElementById('vessels').value = 'd-loop';
                document.getElementById('asdCheck').checked = false;
                document.getElementById('vsdCheck').checked = true;
            }
            drawHeart();
        }

        function drawHeart() {
            const situs = document.getElementById('situs').value;
            const loop = document.getElementById('loop').value;
            const av = document.getElementById('av').value;
            const va = document.getElementById('va').value;
            const vessels = document.getElementById('vessels').value;
            const hasASD = document.getElementById('asdCheck').checked;
            const hasVSD = document.getElementById('vsdCheck').checked;

            let vaSign = va === 'concordant' ? 'S' : (va === 'discordant' ? 'D' : 'DORV');
            document.getElementById('notationDisplay').innerText = `{${situs}, ${loop}, ${vaSign}}`;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const blockW = 120;
            const blockH = 90;
            const atriumY = 110;     
            const ventricleY = 270;  

            let raX = 90, laX = 230;
            if (situs === 'I') { raX = 230; laX = 90; }

            let rvX = 90, lvX = 230;
            if (loop === 'L') { rvX = 230; lvX = 90; }

            // 1. วาดท่อรับเลือดเข้าจากด้านบน (Inflow)
            drawInflowTubes(raX, laX, atriumY, blockW);

            // 2. วาดกล่องห้องหัวใจ Atria (ห้องบน)
            drawAnatomicalBlock(raX, atriumY, blockW, blockH, "RA", "รับเลือดดำจากร่างกาย", "#e3f2fd", "#1565c0");
            drawAnatomicalBlock(laX, atriumY, blockW, blockH, "LA", "รับเลือดแดงจากปอด", "#ffebee", "#c62828");

            // 3. วาดกล่องห้องหัวใจ Ventricles (ห้องล่าง)
            let rvBg = "#bbdefb", rvBorder = "#0d47a1", rvText = "ขับเคลื่อนระบบ Pulmonary";
            if (va === 'dorv') {
                rvBg = "#e1bee7"; 
                rvBorder = "#4a148c";
                rvText = "เลือดผสม (Mixed Blood)";
            }
            drawAnatomicalBlock(rvX, ventricleY, blockW, blockH, "RV", rvText, rvBg, rvBorder); 
            // รักษาการแก้ไขสีของคุณนครไว้: LV ปรับเป็นสีแดง/ขอบแดงตาม LA เพื่อความง่ายในการอธิบายเรื่องเลือดแดง
            drawAnatomicalBlock(lvX, ventricleY, blockW, blockH, "LV", "ขับเคลื่อนระบบ Systemic", "#ffebee", "#c62828");

            // 4. วาดลิ้นหัวใจกั้นห้อง (AV Connection)
            drawAVValves(raX, laX, rvX, lvX, atriumY + blockH, ventricleY, blockW, av);

            // 5. วาดรูรั่วเชื่อมพยาธิสภาพ (Shunts)
            if (hasASD) {
                drawSeptalDefect(raX, laX, atriumY, blockW, blockH, "ASD");
            }
            if (hasVSD) {
                drawSeptalDefect(rvX, lvX, ventricleY, blockW, blockH, "VSD");
            }

            // 6. วาดเส้นเลือดใหญ่ออกจาก Ventricles ดิ่งลงด้านล่างสุด (Outflow)
            let aoBotX = 230, paBotX = 90; 
            if (vessels === 'd-loop') { aoBotX = 90; paBotX = 230; }
            else if (vessels === 'l-loop') { aoBotX = 70; paBotX = 250; }

            let aoColor = "#ff3333";
            let paColor = "#3366ff";

            if (va === 'dorv') {
                aoColor = "#9c27b0";
                paColor = "#9c27b0";
                let rvCenter = rvX + blockW / 2;
                drawOutflowTube(rvCenter - 20, ventricleY + blockH, aoBotX + blockW/2, 440, aoColor, "AO (Mixed)");
                drawOutflowTube(rvCenter + 20, ventricleY + blockH, paBotX + blockW/2, 440, paColor, "PA (Mixed)");
            } else if (va === 'discordant') {
                drawOutflowTube(rvX + blockW/2, ventricleY + blockH, aoBotX + blockW/2, 440, aoColor, "AO (Aorta)");
                drawOutflowTube(lvX + blockW/2, ventricleY + blockH, paBotX + blockW/2, 440, paColor, "PA (Pulmonary)");
            } else {
                drawOutflowTube(lvX + blockW/2, ventricleY + blockH, aoBotX + blockW/2, 440, aoColor, "AO (Aorta)");
                drawOutflowTube(rvX + blockW/2, ventricleY + blockH, paBotX + blockW/2, 440, paColor, "PA (Pulmonary)");
            }
        }

        function drawAnatomicalBlock(x, y, w, h, title, subtitle, bgColor, borderColor) {
            ctx.fillStyle = bgColor;
            ctx.strokeStyle = borderColor;
            ctx.lineWidth = 4;
            ctx.fillRect(x, y, w, h);
            ctx.strokeRect(x, y, w, h);

            ctx.fillStyle = borderColor;
            ctx.font = "bold 22px Arial";
            ctx.textAlign = "center";
            ctx.fillText(title, x + w/2, y + h/2 - 5);

            ctx.fillStyle = "#555";
            ctx.font = "10px Arial";
            ctx.fillText(subtitle, x + w/2, y + h/2 + 20);
        }

        function drawInflowTubes(raX, laX, atriumY, blockW) {
            ctx.lineWidth = 14;
            ctx.lineCap = "square";

            ctx.strokeStyle = "#3366ff";
            ctx.beginPath();
            ctx.moveTo(raX + blockW/3, 40); ctx.lineTo(raX + blockW/3, atriumY);
            ctx.moveTo(raX + (2*blockW)/3, 40); ctx.lineTo(raX + (2*blockW)/3, atriumY);
            ctx.stroke();

            ctx.fillStyle = "#3366ff";
            ctx.font = "bold 11px Arial";
            ctx.textAlign = "center";
            ctx.fillText("SVC / IVC", raX + blockW/2, 30);

            ctx.strokeStyle = "#ff3333";
            ctx.beginPath();
            ctx.moveTo(laX + blockW/4, 40); ctx.lineTo(laX + blockW/2, 75);
            ctx.moveTo(laX + (3*blockW)/4, 40); ctx.lineTo(laX + blockW/2, 75);
            ctx.moveTo(laX + blockW/2, 75); ctx.lineTo(laX + blockW/2, atriumY);
            ctx.stroke();

            ctx.fillStyle = "#ff3333";
            ctx.font = "bold 11px Arial";
            ctx.textAlign = "center";
            ctx.fillText("Pulm Veins", laX + blockW/2, 30);
        }

        function drawAVValves(topX1, topX2, botX1, botX2, topY, botY, blockW, mode) {
            ctx.strokeStyle = "#455a64";
            ctx.lineWidth = 4;
            ctx.setLineDash([5, 5]);

            ctx.beginPath();
            if (mode === 'concordant') {
                ctx.moveTo(topX1 + blockW/2, topY); ctx.lineTo(botX1 + blockW/2, botY);
                ctx.moveTo(topX2 + blockW/2, topY); ctx.lineTo(botX2 + blockW/2, botY);
            } else {
                ctx.moveTo(topX1 + blockW/2, topY); ctx.lineTo(botX2 + blockW/2, botY);
                ctx.moveTo(topX2 + blockW/2, topY); ctx.lineTo(botX1 + blockW/2, botY);
            }
            ctx.stroke();
            ctx.setLineDash([]);
        }

        // ปรับปรุงฟังก์ชันวาดรูรั่วให้ฉลาดขึ้น (รองรับทั้งการเป็น ASD และ VSD ตามพิกัดชั้นห้อง)
        function drawSeptalDefect(leftX, rightX, yCoord, blockW, blockH, label) {
            let leftBoxRightEdge = Math.min(leftX, rightX) + blockW;
            let rightBoxLeftEdge = Math.max(leftX, rightX);
            let midX = (leftBoxRightEdge + rightBoxLeftEdge) / 2;
            let midY = yCoord + blockH / 2;

            // เส้นเชื่อมผ่านกั้นห้อง
            ctx.strokeStyle = "#ffa726"; 
            ctx.lineWidth = 12;
            ctx.beginPath();
            ctx.moveTo(leftBoxRightEdge - 15, midY);
            ctx.lineTo(rightBoxLeftEdge + 15, midY);
            ctx.stroke();

            // วงกลมรูรั่ว
            ctx.fillStyle = "#ffffff";
            ctx.strokeStyle = "#e65100";
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(midX, midY, 10, 0, 2 * Math.PI);
            ctx.fill();
            ctx.stroke();

            // ข้อความกำกับรูรั่ว
            ctx.fillStyle = "#e65100";
            ctx.font = "bold 9px Arial";
            ctx.textAlign = "center";
            ctx.fillText(label, midX, midY + 3);
        }

        function drawOutflowTube(startX, startY, endX, endY, color, label) {
            ctx.strokeStyle = color;
            ctx.lineWidth = 14;
            ctx.lineCap = "square";
            
            ctx.beginPath();
            ctx.moveTo(startX, startY);
            ctx.bezierCurveTo(startX, (startY + endY)/2, endX, (startY + endY)/2 - 30, endX, endY);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(endX, endY); ctx.lineTo(endX - 20, endY + 25);
            ctx.moveTo(endX, endY); ctx.lineTo(endX + 20, endY + 25);
            ctx.stroke();

            ctx.fillStyle = color;
            ctx.fillRect(endX - 45, endY - 12, 90, 18);
            
            ctx.fillStyle = "#ffffff";
            ctx.font = "bold 11px Arial";
            ctx.textAlign = "center";
            ctx.fillText(label, endX, endY + 1);
        }

        applyPreset('normal');
    </script>
</body>
</html>
