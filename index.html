<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Segmental Analysis CHD Simulator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f7fa;
            color: #333;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .controls-panel {
            flex: 1;
            min-width: 300px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .visual-panel {
            flex: 1.5;
            min-width: 450px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1, h2 {
            margin-top: 0;
            color: #2c3e50;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 0.9rem;
        }
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            background-color: #fff;
            font-size: 1rem;
        }
        .image-container {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            background-color: #fafafa;
            width: 100%;
            max-width: 450px;
            min-height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 10px;
        }
        #heartImage {
            max-width: 100%;
            max-height: 500px;
            height: auto;
            object-fit: contain;
        }
        .notation-badge {
            margin-top: 15px;
            padding: 10px 20px;
            background-color: #e8f4fd;
            color: #1d88e5;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1.2rem;
        }
        .preset-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .btn {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-primary { background-color: #1d88e5; color: white; }
        .btn-secondary { background-color: #78909c; color: white; }
    </style>
</head>
<body>

    <div style="text-align: center; margin-bottom: 20px;">
        <h1>Segmental Analysis CHD Simulator (Prototype)</h1>
        <p>เครื่องมือสาธิตโครงสร้างโรคหัวใจพิการแต่กำเนิดสำหรับบุคลากรทางการแพทย์</p>
    </div>

    <div class="container">
        <div class="controls-panel">
            <h2>1. Segmental Inputs</h2>
            
            <div class="preset-buttons">
                <button class="btn btn-secondary" onclick="applyPreset('normal')">Normal Anatomy</button>
                <button class="btn btn-primary" onclick="applyPreset('dtga')">d-TGA</button>
            </div>

            <div class="form-group">
                <label for="situs">1. Atrial Situs</label>
                <select id="situs" onchange="updateUI()">
                    <option value="S">Situs Solitus (S)</option>
                    <option value="I">Situs Inversus (I)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="loop">2. Ventricular Loop</label>
                <select id="loop" onchange="updateUI()">
                    <option value="D">D-Loop (RV Right, LV Left)</option>
                    <option value="L">L-Loop (RV Left, LV Right)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="av">3. AV Connection</label>
                <select id="av" onchange="updateUI()">
                    <option value="concordant">Concordant (RA->RV, LA->LV)</option>
                    <option value="discordant">Discordant (RA->LV, LA->RV)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="va">4. VA Connection</label>
                <select id="va" onchange="updateUI()">
                    <option value="concordant">Concordant (LV->Ao, RV->PA)</option>
                    <option value="discordant">Discordant (RV->Ao, LV->PA) - TGA</option>
                </select>
            </div>

            <div class="form-group">
                <label for="vessels">5. Great Arteries Relationship</label>
                <select id="vessels" onchange="updateUI()">
                    <option value="normal">Normal (Ao Posterior/Right of PA)</option>
                    <option value="d-loop">D-Malposition (Ao Anterior/Right)</option>
                    <option value="l-loop">L-Malposition (Ao Anterior/Left)</option>
                </select>
            </div>
        </div>

        <div class="visual-panel">
            <h2>2. Anatomical Diagram</h2>
            <div class="image-container">
                <img id="heartImage" src="normal-heart.png" alt="Heart Structure">
            </div>
            <div class="notation-badge" id="notationDisplay">{S, D, S}</div>
            <div style="margin-top: 10px; font-size: 0.9rem; color: #555; text-align: center; max-width: 400px;" id="statusMessage">
                แสดงโครงสร้างหัวใจปกติ (Normal Anatomy) ตามรูปภาพทางการแพทย์ที่คุณอัปโหลด
            </div>
        </div>
    </div>

    <script>
        function applyPreset(type) {
            if(type === 'normal') {
                document.getElementById('situs').value = 'S';
                document.getElementById('loop').value = 'D';
                document.getElementById('av').value = 'concordant';
                document.getElementById('va').value = 'concordant';
                document.getElementById('vessels').value = 'normal';
            } else if(type === 'dtga') {
                document.getElementById('situs').value = 'S';
                document.getElementById('loop').value = 'D';
                document.getElementById('av').value = 'concordant';
                document.getElementById('va').value = 'discordant';
                document.getElementById('vessels').value = 'd-loop';
            }
            updateUI();
        }

        function updateUI() {
            const situs = document.getElementById('situs').value;
            const loop = document.getElementById('loop').value;
            const va = document.getElementById('va').value;
            
            const imgElement = document.getElementById('heartImage');
            const msgElement = document.getElementById('statusMessage');

            // อัปเดตตัวย่อระบบสากล {S, D, S}
            let vaSign = va === 'concordant' ? 'S' : 'D';
            document.getElementById('notationDisplay').innerText = `{${situs}, ${loop}, ${vaSign}}`;

            // ตรรกะตรวจเช็คเงื่อนไขในการสลับรูปภาพ
            if (situs === 'S' && loop === 'D' && va === 'discordant') {
                // หากเลือกเป็นเงื่อนไข d-TGA แต่ปัจจุบันเรายังไม่มีรูป d-tga-heart.png
                // ระบบจะแจ้งเตือนให้รู้ แต่สำหรับก้าวแรกสามารถใช้ระบบเงื่อนไขสลับลิงก์นี้เช็คตรรกะก่อนได้ครับ
                imgElement.src = "normal-heart.png"; // เปลี่ยนเป็นชื่อไฟล์ d-tga-heart.png เมื่อคุณอัปโหลดในอนาคต
                msgElement.innerHTML = "<span style='color: #d32f2f; font-weight:bold;'>เคส d-TGA:</span> ดรอปดาวน์เปลี่ยนตรรกะถูกต้องแล้ว (ในอนาคตเมื่อคุณนำรูปเคส d-TGA ไปอัปโหลดตั้งชื่อไฟล์ใน GitHub ระบบจะดึงภาพมาแสดงแทนที่ทันทีครับ)";
            } else {
                // หากเป็นค่าอื่นๆ หรือ Normal สมบูรณ์
                imgElement.src = "normal-heart.png";
                msgElement.innerHTML = "แสดงโครงสร้างหัวใจปกติ (Normal Anatomy) ตามรูปภาพทางการแพทย์ที่คุณอัปโหลด";
            }
        }

        // รันตั้งต้นให้ทำงานตอนโหลดหน้าเว็บ
        updateUI();
    </script>
</body>
</html>
